# Pre-warms every possible ROUND share card for the current Pacific
# puzzle day, right after the 2:15am PT reset. First renders on the
# free Workers plan can exceed the per-request CPU limit (cold wasm
# init) — but a successful render persists to R2 forever, so warming
# the full round-code space once per day makes every round card a
# storage hit before any player shares one. Daily-summary codes are
# combinatorially unbounded and stay on-demand (sharer prefetch retries
# + permanent storage cover them).
#
# Two UTC schedules cover PST/PDT year-round; a post-reset window guard
# (see below) lets the delayed real trigger through while skipping pre-reset
# firings. Code space (~97/day) mirrors lib/shareUrl.ts + per-mode caps:
#   classic c: wins g1-8 with hints h0-2 (g+h<=8), losses z/z1/z2
#   quote   q: wins 1-8, loss z
#   splash  p: wins 1-5, loss z
#   sound   s: wins g1-8 x skips k (g+k<=8), losses z + z1..z7
#   ability a: wins 1-8, loss z
#   melee   e: wins 1-3, loss z (bonus mode)

name: Pre-warm OG cards

on:
  schedule:
    - cron: "25 9 * * *" # 02:25 PDT (summer) / 01:25 PST (harmless)
    - cron: "25 10 * * *" # 02:25 PST (winter) / 03:25 PDT (harmless)
  workflow_dispatch:

jobs:
  prewarm:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Render every round code for today
        run: |
          DAY=$(TZ=America/Los_Angeles date +%y%m%d)
          echo "Pacific puzzle day: $DAY"

          # Both UTC crons fire daily (GitHub Actions has no DST awareness).
          # An earlier guard required the run to land at EXACTLY 02:xx PT, but
          # GitHub delays scheduled crons by 1-3h, so the real trigger kept
          # arriving at 03-05 PT and self-skipped — every run went green while
          # warming nothing, and R2 silently stopped being topped up. Accept a
          # post-reset WINDOW (02:00-08:59 PT) instead: it catches the delayed
          # trigger. Both crons can now land in the window on the same day, and
          # that's fine — re-warming an already-stored code is a cheap R2 hit
          # (the render-once fast path), not a fresh render, so a duplicate run
          # just re-confirms storage in seconds. Firings before 02:00 PT (incl.
          # the winter early cron at 01:25 PST) still skip, so we never warm
          # ahead of the 2:15am puzzle roll. Manual dispatch always runs.
          HOUR=$(TZ=America/Los_Angeles date +%H)
          case "$HOUR" in
            02 | 03 | 04 | 05 | 06 | 07 | 08) ;;
            *)
              if [ "$GITHUB_EVENT_NAME" = "schedule" ]; then
                echo "Pacific hour $HOUR — outside the post-reset warm window, skipping."
                exit 0
              fi
              ;;
          esac

          codes=()
          # classic: wins (guesses+hints<=8) with hint modifier
          for h in 0 1 2; do
            max=$((8 - h))
            for g in $(seq 1 $max); do
              if [ $h -eq 0 ]; then codes+=("${DAY}c${g}"); else codes+=("${DAY}c${g}${h}"); fi
            done
          done
          codes+=("${DAY}cz" "${DAY}cz1" "${DAY}cz2")
          # quote: 1-8 + loss
          for g in $(seq 1 8); do codes+=("${DAY}q${g}"); done
          codes+=("${DAY}qz")
          # splash: 1-5 + loss
          for g in $(seq 1 5); do codes+=("${DAY}p${g}"); done
          codes+=("${DAY}pz")
          # sound: wins (picks g, skips k, g+k<=8) with skip modifier
          for g in $(seq 1 8); do
            maxk=$((8 - g))
            for k in $(seq 0 $maxk); do
              if [ $k -eq 0 ]; then codes+=("${DAY}s${g}"); else codes+=("${DAY}s${g}${k}"); fi
            done
          done
          # sound losses: 8 attempts spent, skip tally 0-8 (all-skip
          # losses encode picks=0, skips=8)
          codes+=("${DAY}sz")
          for k in $(seq 1 8); do codes+=("${DAY}sz${k}"); done
          # ability: 1-8 + loss
          for g in $(seq 1 8); do codes+=("${DAY}a${g}"); done
          codes+=("${DAY}az")
          # melee (bonus mode, letter e): guess in 3, no modifier + loss
          for g in $(seq 1 3); do codes+=("${DAY}e${g}"); done
          codes+=("${DAY}ez")

          echo "${#codes[@]} codes"

          # Two passes with a cool-down between them: a CPU-killed wasm
          # init can WEDGE the isolate this runner's connections are
          # pinned to, failing every code after some point in the loop.
          # The pause lets routing/isolates rotate; pass 2 only touches
          # what pass 1 missed (successes are already stored in R2).
          # Red runs (and the failure email they send) therefore mean a
          # real persistent problem, not one unlucky isolate.
          warm_pass() {
            local -n in_codes=$1
            local -n out_failed=$2
            out_failed=()
            for code in "${in_codes[@]}"; do
              local ok=0 st=""
              for try in 1 2 3 4 5; do
                st=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
                  "https://playowdle.com/og/r/${code}")
                if [ "$st" = "200" ]; then ok=1; break; fi
                sleep 2
              done
              if [ $ok -eq 0 ]; then out_failed+=("$code"); fi
            done
          }

          warm_pass codes pass1_failed
          echo "pass 1: warmed $(( ${#codes[@]} - ${#pass1_failed[@]} ))/${#codes[@]}"

          failed=()
          if [ ${#pass1_failed[@]} -gt 0 ]; then
            echo "cooling down 90s before pass 2 (${#pass1_failed[@]} codes left)"
            sleep 90
            warm_pass pass1_failed failed
            echo "pass 2: warmed $(( ${#pass1_failed[@]} - ${#failed[@]} ))/${#pass1_failed[@]}"
          fi

          echo "total warmed $(( ${#codes[@]} - ${#failed[@]} ))/${#codes[@]}"
          if [ ${#failed[@]} -gt 0 ]; then
            echo "::error::${#failed[@]} codes failed both passes: ${failed[*]}"
            exit 1
          fi
